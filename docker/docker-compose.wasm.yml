version: '3.8'

services:
  registry:
    build:
      context: ..
      dockerfile: packages/registry/Dockerfile
    ports:
      - "5000:5000"
    environment:
      PORT: "5000"
      STORAGE_TYPE: filesystem
      STORAGE_PATH: /var/lib/gaesup-registry
      AUTH_ENABLED: "false"
    volumes:
      - registry-data:/var/lib/gaesup-registry
    networks:
      - gaesup-network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5000/health"]
      interval: 10s
      timeout: 3s
      retries: 5

networks:
  gaesup-network:
    driver: bridge

volumes:
  registry-data:
    driver: local